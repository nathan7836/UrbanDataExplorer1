<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Corps du RER -->
  <rect x="20" y="30" width="60" height="40" rx="5" fill="#0066CC"/>
  <rect x="25" y="35" width="50" height="30" rx="3" fill="#003E7E"/>
  <!-- Fenêtres -->
  <rect x="30" y="40" width="10" height="10" fill="#FFFFFF" opacity="0.9"/>
  <rect x="45" y="40" width="10" height="10" fill="#FFFFFF" opacity="0.9"/>
  <rect x="60" y="40" width="10" height="10" fill="#FFFFFF" opacity="0.9"/>
  <!-- Portes -->
  <rect x="28" y="52" width="7" height="15" fill="#FFFFFF" opacity="0.7"/>
  <rect x="40" y="52" width="7" height="15" fill="#FFFFFF" opacity="0.7"/>
  <rect x="55" y="52" width="7" height="15" fill="#FFFFFF" opacity="0.7"/>
  <rect x="67" y="52" width="7" height="15" fill="#FFFFFF" opacity="0.7"/>
  <!-- Roues -->
  <circle cx="30" cy="78" r="7" fill="#333333"/>
  <circle cx="50" cy="78" r="7" fill="#333333"/>
  <circle cx="70" cy="78" r="7" fill="#333333"/>
  <!-- Caténaire -->
  <line x1="50" y1="20" x2="50" y2="30" stroke="#FFD700" stroke-width="4"/>
  <circle cx="50" cy="20" r="5" fill="#FFD700"/>
  <!-- Lettre R -->
  <text x="50" y="60" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">R</text>
</svg>

