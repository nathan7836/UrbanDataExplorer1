<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Corps du métro -->
  <rect x="20" y="30" width="60" height="40" rx="5" fill="#003E7E"/>
  <rect x="25" y="35" width="50" height="30" rx="3" fill="#0066CC"/>
  <!-- Fenêtres -->
  <rect x="30" y="40" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
  <rect x="45" y="40" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
  <rect x="60" y="40" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
  <!-- Portes -->
  <rect x="28" y="52" width="6" height="15" fill="#FFFFFF" opacity="0.6"/>
  <rect x="38" y="52" width="6" height="15" fill="#FFFFFF" opacity="0.6"/>
  <rect x="56" y="52" width="6" height="15" fill="#FFFFFF" opacity="0.6"/>
  <rect x="66" y="52" width="6" height="15" fill="#FFFFFF" opacity="0.6"/>
  <!-- Roues -->
  <circle cx="30" cy="75" r="6" fill="#333333"/>
  <circle cx="70" cy="75" r="6" fill="#333333"/>
  <!-- Caténaire -->
  <line x1="50" y1="20" x2="50" y2="30" stroke="#FFD700" stroke-width="3"/>
  <circle cx="50" cy="20" r="4" fill="#FFD700"/>
</svg>

