# Ingestion planifiée — pipeline Bronze → Gold + plateforme
name: Pipeline hebdomadaire

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run data pipeline
        run: python pipeline.py
      - name: Verify Gold output
        run: test -f data/gold/real_estate_data_gold_latest.json
